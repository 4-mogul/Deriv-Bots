<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual Martingale Bot — V75 (1s)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;700&display=swap');
:root{--bg:#0a0e17;--surface:#111827;--surface2:#1a2236;--border:#1e2d45;--over:#00e5a0;--under:#f43f5e;--accent:#3b82f6;--text:#e2e8f0;--muted:#64748b;--warn:#f59e0b;--mono:'Share Tech Mono',monospace;--sans:'Inter',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:12px;}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;}
.header-left{display:flex;align-items:center;gap:10px;}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--over),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:bold;color:#000;}
.title{font-size:15px;font-weight:700;}
.subtitle{font-size:11px;color:var(--muted);}
.conn-badge{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.conn-dot.live{background:var(--over);box-shadow:0 0 6px var(--over);}
.tape-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:12px;}
.tape-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.tape{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.tape-digit{min-width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-family:var(--mono);font-size:14px;background:var(--surface2);border:1px solid var(--border);flex-shrink:0;}
.tape-digit.new{background:var(--accent);color:#fff;}
.freq-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;}
.freq-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;justify-content:space-between;}
.freq-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;}
.freq-col{display:flex;flex-direction:column;align-items:center;gap:3px;}
.freq-bar-wrap{width:100%;height:48px;display:flex;align-items:flex-end;background:var(--surface2);border-radius:4px;overflow:hidden;}
.freq-bar{width:100%;background:var(--accent);transition:height 0.4s;border-radius:4px 4px 0 0;}
.freq-bar.hot{background:var(--under);}
.freq-bar.cold{background:var(--over);}
.freq-num{font-family:var(--mono);font-size:9px;color:var(--muted);}
.freq-d{font-family:var(--mono);font-size:11px;font-weight:bold;}
.freq-badge{font-size:8px;padding:1px 4px;border-radius:3px;font-family:var(--mono);}
.badge-over{background:rgba(0,229,160,0.15);color:var(--over);}
.badge-under{background:rgba(244,63,94,0.15);color:var(--under);}
.auto-pick{display:flex;gap:8px;margin-bottom:12px;}
.pick-card{flex:1;padding:10px 12px;border-radius:10px;border:1px solid;display:flex;flex-direction:column;gap:2px;}
.pick-card.over-card{border-color:rgba(0,229,160,0.3);background:rgba(0,229,160,0.05);}
.pick-card.under-card{border-color:rgba(244,63,94,0.3);background:rgba(244,63,94,0.05);}
.pick-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.pick-digit{font-family:var(--mono);font-size:26px;font-weight:bold;line-height:1;}
.pick-digit.over{color:var(--over);}
.pick-digit.under{color:var(--under);}
.pick-sub{font-size:10px;color:var(--muted);}
.controls{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.ctrl-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.ctrl-row.three{grid-template-columns:1fr 1fr 1fr;}
.field label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:var(--mono);outline:none;}
.btn-row{display:flex;gap:8px;}
.btn{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);}
.btn-start{background:linear-gradient(135deg,var(--over),#00b37a);color:#000;}
.btn-stop{background:rgba(244,63,94,0.15);color:var(--under);border:1px solid rgba(244,63,94,0.3);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.stat-val{font-family:var(--mono);font-size:18px;font-weight:bold;line-height:1;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;margin-top:4px;}
.green{color:var(--over);}
.red{color:var(--under);}
.blue{color:var(--accent);}
.yellow{color:var(--warn);}
.dual-status{display:flex;gap:8px;margin-bottom:12px;}
.bot-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;}
.bot-card.over-bot{border-top:2px solid var(--over);}
.bot-card.under-bot{border-top:2px solid var(--under);}
.bot-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.bot-name{font-size:11px;font-weight:700;text-transform:uppercase;}
.bot-name.over{color:var(--over);}
.bot-name.under{color:var(--under);}
.bot-status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.bot-status-dot.active{background:var(--over);box-shadow:0 0 5px var(--over);}
.bot-status-dot.recovering{background:var(--warn);box-shadow:0 0 5px var(--warn);}
.bot-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
.bot-row span:first-child{color:var(--muted);}
.bot-row span:last-child{font-family:var(--mono);}
.log-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.log-head{padding:8px 14px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.log-clear{font-size:10px;color:var(--accent);cursor:pointer;background:none;border:none;}
.log-body{height:160px;overflow-y:auto;padding:8px;font-family:var(--mono);font-size:11px;}
.log-entry{padding:3px 6px;border-radius:4px;margin-bottom:2px;line-height:1.5;}
.log-entry.win{color:var(--over);}
.log-entry.loss{color:var(--under);}
.log-entry.info{color:var(--muted);}
.log-entry.warn{color:var(--warn);}
.log-entry.stop{color:var(--accent);}
.token-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;}
.token-row{display:flex;gap:8px;align-items:flex-end;}
.token-row .field{flex:1;margin:0;}
.btn-connect{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;}
.pnl-bar-wrap{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:12px;overflow:hidden;}
.pnl-bar{height:100%;width:50%;background:var(--muted);border-radius:2px;transition:all 0.4s;}
</style>
</head>
<body>
<div class="header"><div class="header-left"><div class="logo">DM</div><div><div class="title">Dual Martingale</div><div class="subtitle">V75 (1s) · Over &amp; Under</div></div></div><div class="conn-badge"><div class="conn-dot" id="connDot"></div><span id="connText">Disconnected</span></div></div>
<div class="token-wrap"><div class="token-row"><div class="field"><label>Deriv API Token</label><input type="password" id="apiToken" placeholder="Paste your API token"/></div><button class="btn-connect" onclick="connectWS()">Connect</button></div></div>
<div class="tape-wrap"><div class="tape-label">Live Digit Tape</div><div class="tape" id="digitTape"></div></div>
<div class="freq-wrap"><div class="freq-title"><span>Digit Frequency</span><span id="tickCount">0 ticks</span></div><div class="freq-grid" id="freqGrid"></div></div>
<div class="auto-pick"><div class="pick-card over-card"><div class="pick-label">Over Bot Target</div><div class="pick-digit over" id="overDigit">—</div><div class="pick-sub" id="overSub">Waiting...</div></div><div class="pick-card under-card"><div class="pick-label">Under Bot Target</div><div class="pick-digit under" id="underDigit">—</div><div class="pick-sub" id="underSub">Waiting...</div></div></div>
<div class="controls"><div class="ctrl-row"><div class="field"><label>Base Stake ($)</label><input type="number" id="baseStake" value="0.35" min="0.35" step="0.01"/></div><div class="field"><label>Multiplier</label><input type="number" id="multiplier" value="2.1" min="1.1" step="0.1"/></div></div><div class="ctrl-row three"><div class="field"><label>Take Profit ($)</label><input type="number" id="takeProfit" value="5"/></div><div class="field"><label>Stop Loss ($)</label><input type="number" id="stopLoss" value="10"/></div><div class="field"><label>Max Steps</label><input type="number" id="maxSteps" value="5"/></div></div><div class="btn-row"><button class="btn btn-start" id="startBtn" onclick="startBots()" disabled>▶ Start</button><button class="btn btn-stop" id="stopBtn" onclick="stopBots()" disabled>■ Stop</button></div></div>
<div class="pnl-bar-wrap"><div class="pnl-bar" id="pnlBar"></div></div>
<div class="stats"><div class="stat-card"><div class="stat-val green" id="statPnl">$0.00</div><div class="stat-lbl">Net P&amp;L</div></div><div class="stat-card"><div class="stat-val blue" id="statWins">0</div><div class="stat-lbl">Wins</div></div><div class="stat-card"><div class="stat-val red" id="statLosses">0</div><div class="stat-lbl">Losses</div></div><div class="stat-card"><div class="stat-val yellow" id="statTrades">0</div><div class="stat-lbl">Trades</div></div><div class="stat-card"><div class="stat-val" id="statWR">0%</div><div class="stat-lbl">Win Rate</div></div><div class="stat-card"><div class="stat-val blue" id="statBalance">—</div><div class="stat-lbl">Balance</div></div></div>
<div class="dual-status"><div class="bot-card over-bot"><div class="bot-head"><span class="bot-name over">Over Bot</span><div class="bot-status-dot" id="overDot"></div></div><div class="bot-row"><span>Digit</span><span id="oDigitLive">—</span></div><div class="bot-row"><span>Stake</span><span id="oStakeLive">—</span></div><div class="bot-row"><span>Step</span><span id="oStepLive">0</span></div><div class="bot-row"><span>Status</span><span id="oLastLive">—</span></div></div><div class="bot-card under-bot"><div class="bot-head"><span class="bot-name under">Under Bot</span><div class="bot-status-dot" id="underDot"></div></div><div class="bot-row"><span>Digit</span><span id="uDigitLive">—</span></div><div class="bot-row"><span>Stake</span><span id="uStakeLive">—</span></div><div class="bot-row"><span>Step</span><span id="uStepLive">0</span></div><div class="bot-row"><span>Status</span><span id="uLastLive">—</span></div></div></div>
<div class="log-wrap"><div class="log-head"><span>Trade Log</span><button class="log-clear" onclick="clearLog()">Clear</button></div><div class="log-body" id="logBody"></div></div>
<script>
const SYMBOL='1HZ75V',APP_ID=36544;
const WS_URL=`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`;
let ws=null,connected=false,running=false,balance=null;
let digitHistory=[],sessionPnl=0,sessionWins=0,sessionLosses=0,sessionTrades=0;
let overBot={step:0,stake:0,digit:null,waiting:false};
let underBot={step:0,stake:0,digit:null,waiting:false};
let activeContracts={};
function connectWS(){
  const token=document.getElementById('apiToken').value.trim();
  if(!token){addLog('Enter API token first','warn');return;}
  if(ws)ws.close();
  addLog('Connecting...','info');
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{connected=true;setConn(true);send({authorize:token});};
  ws.onmessage=e=>handleMsg(JSON.parse(e.data));
  ws.onerror=()=>{addLog('WebSocket error','warn');setConn(false);};
  ws.onclose=()=>{connected=false;setConn(false);if(running){addLog('Connection lost','warn');stopBots();}};
}
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o));}
function handleMsg(m){
  if(m.error){addLog('Error: '+m.error.message,'warn');return;}
  if(m.msg_type==='authorize'){balance=m.authorize.balance;updateBal(balance);addLog('Authorized: '+m.authorize.loginid+' $'+balance,'info');send({ticks:SYMBOL,subscribe:1});send({balance:1,subscribe:1});document.getElementById('startBtn').disabled=false;}
  else if(m.msg_type==='balance'){balance=m.balance.balance;updateBal(balance);}
  else if(m.msg_type==='tick')handleTick(m.tick);
  else if(m.msg_type==='buy')handleBuy(m);
  else if(m.msg_type==='proposal_open_contract')handlePOC(m.proposal_open_contract);
}
function handleTick(tick){
  const d=parseInt(tick.quote.toString().slice(-1));
  digitHistory.push(d);
  if(digitHistory.length>100)digitHistory.shift();
  updateTape(d);updateFreq();updatePick();
  if(running)tryTrade();
}
function freq(){const f=Array(10).fill(0);digitHistory.forEach(d=>f[d]++);return f;}
function updatePick(){
  if(digitHistory.length<10)return;
  const f=freq();
  let od=0,minO=Infinity;
  for(let d=0;d<=8;d++)if(f[d]<minO){minO=f[d];od=d;}
  let ud=9,minU=Infinity;
  for(let d=1;d<=9;d++)if(f[d]<minU){minU=f[d];ud=d;}
  overBot.digit=od;underBot.digit=ud;
  const t=digitHistory.length;
  document.getElementById('overDigit').textContent=od;
  document.getElementById('overSub').textContent='~'+(digitHistory.filter(d=>d>od).length/t*100).toFixed(1)+'% win rate';
  document.getElementById('underDigit').textContent=ud;
  document.getElementById('underSub').textContent='~'+(digitHistory.filter(d=>d<ud).length/t*100).toFixed(1)+'% win rate';
  document.getElementById('oDigitLive').textContent=od;
  document.getElementById('uDigitLive').textContent=ud;
}
function tryTrade(){
  const tp=parseFloat(document.getElementById('takeProfit').value);
  const sl=parseFloat(document.getElementById('stopLoss').value);
  if(sessionPnl>=tp){addLog('Take Profit hit! +$'+sessionPnl.toFixed(2),'stop');stopBots();return;}
  if(sessionPnl<=-sl){addLog('Stop Loss hit! -$'+Math.abs(sessionPnl).toFixed(2),'stop');stopBots();return;}
  if(!overBot.waiting&&overBot.digit!==null)placeTrade('over');
  if(!underBot.waiting&&underBot.digit!==null)placeTrade('under');
}
function placeTrade(side){
  const base=parseFloat(document.getElementById('baseStake').value);
  const mult=parseFloat(document.getElementById('multiplier').value);
  const maxS=parseInt(document.getElementById('maxSteps').value);
  const bot=side==='over'?overBot:underBot;
  if(bot.waiting)return;
  if(bot.step>=maxS){addLog(side.toUpperCase()+' max steps reached, resetting','warn');resetBot(side);return;}
  let stake=base;
  for(let i=0;i<bot.step;i++)stake*=mult;
  stake=Math.max(0.35,Math.round(stake*100)/100);
  bot.stake=stake;bot.waiting=true;updateBotUI(side);
  send({buy:1,price:stake,parameters:{amount:stake,basis:'stake',contract_type:side==='over'?'DIGITOVER':'DIGITUNDER',currency:'USD',duration:1,duration_unit:'t',symbol:SYMBOL,barrier:bot.digit.toString()}});
}
function handleBuy(m){
  if(m.error){addLog('Buy error: '+m.error.message,'warn');overBot.waiting=false;underBot.waiting=false;return;}
  activeContracts[m.buy.contract_id]=true;
  send({proposal_open_contract:1,contract_id:m.buy.contract_id,subscribe:1});
}
function handlePOC(p){
  if(!p.is_sold)return;
  const side=p.contract_type==='DIGITOVER'?'over':'under';
  if(!side)return;
  const bot=side==='over'?overBot:underBot;
  bot.waiting=false;
  const profit=parseFloat(p.profit);
  sessionTrades++;sessionPnl+=profit;
  if(profit>0){sessionWins++;addLog(side.toUpperCase()+' WIN Digit:'+bot.digit+' Stake:$'+parseFloat(p.buy_price).toFixed(2)+' +$'+profit.toFixed(2),'win');resetBot(side);}
  else{sessionLosses++;bot.step++;addLog(side.toUpperCase()+' LOSS Digit:'+bot.digit+' Stake:$'+parseFloat(p.buy_price).toFixed(2)+' $'+profit.toFixed(2)+' Step:'+bot.step,'loss');}
  updateStats();updateBotUI(side);
  delete activeContracts[p.contract_id];
}
function resetBot(s){const b=s==='over'?overBot:underBot;b.step=0;b.stake=parseFloat(document.getElementById('baseStake').value);b.waiting=false;updateBotUI(s);}
function startBots(){
  if(!connected){addLog('Connect first','warn');return;}
  if(digitHistory.length<20){addLog('Wait for more tick data...','warn');return;}
  running=true;sessionPnl=0;sessionWins=0;sessionLosses=0;sessionTrades=0;
  resetBot('over');resetBot('under');
  document.getElementById('startBtn').disabled=true;
  document.getElementById('stopBtn').disabled=false;
  setDot('overDot','active');setDot('underDot','active');
  addLog('Dual Martingale started on '+SYMBOL,'stop');
}
function stopBots(){
  running=false;overBot.waiting=false;underBot.waiting=false;
  document.getElementById('startBtn').disabled=false;
  document.getElementById('stopBtn').disabled=true;
  setDot('overDot','');setDot('underDot','');
  addLog('Stopped. P&L: $'+sessionPnl.toFixed(2),'info');
  updateStats();
}
function setConn(on){
  document.getElementById('connDot').className='conn-dot'+(on?' live':'');
  document.getElementById('connText').textContent=on?'Live':'Disconnected';
}
function updateBal(v){document.getElementById('statBalance').textContent='$'+parseFloat(v).toFixed(2);}
function updateStats(){
  const p=sessionPnl;
  const el=document.getElementById('statPnl');
  el.textContent=(p>=0?'+':'')+'$'+p.toFixed(2);
  el.className='stat-val '+(p>=0?'green':'red');
  document.getElementById('statWins').textContent=sessionWins;
  document.getElementById('statLosses').textContent=sessionLosses;
  document.getElementById('statTrades').textContent=sessionTrades;
  const wr=sessionTrades>0?(sessionWins/sessionTrades*100).toFixed(1):'0';
  const we=document.getElementById('statWR');
  we.textContent=wr+'%';we.className='stat-val '+(parseFloat(wr)>=50?'green':'red');
  const sl=parseFloat(document.getElementById('stopLoss').value);
  const tp=parseFloat(document.getElementById('takeProfit').value);
  const bar=document.getElementById('pnlBar');
  bar.style.width=Math.max(0,Math.min(100,((p+sl)/(sl+tp))*100))+'%';
  bar.style.background=p>=0?'var(--over)':'var(--under)';
}
function updateBotUI(s){
  const b=s==='over'?overBot:underBot,px=s==='over'?'o':'u';
  document.getElementById(px+'StakeLive').textContent='$'+b.stake.toFixed(2);
  document.getElementById(px+'StepLive').textContent=b.step;
  document.getElementById(px+'LastLive').textContent=b.waiting?'Trading...':'Idle';
  if(running)setDot(s==='over'?'overDot':'underDot',b.step>0?'recovering':'active');
}
function setDot(id,cls){document.getElementById(id).className='bot-status-dot'+(cls?' '+cls:'');}
function updateTape(d){
  const t=document.getElementById('digitTape');
  const el=document.createElement('div');
  el.className='tape-digit new';el.textContent=d;t.appendChild(el);
  setTimeout(()=>el.classList.remove('new'),300);
  while(t.children.length>40)t.removeChild(t.firstChild);
  t.scrollLeft=t.scrollWidth;
}
function updateFreq(){
  const f=freq(),t=digitHistory.length,mx=Math.max(...f),mn=Math.min(...f),mxF=Math.max(...f);
  const g=document.getElementById('freqGrid');g.innerHTML='';
  for(let d=0;d<=9;d++){
    const pct=mx>0?(f[d]/mx)*100:0;
    let bc='freq-bar';
    if(f[d]===mxF)bc+=' hot';else if(f[d]===mn)bc+=' cold';
    let badge='';
    if(d===overBot.digit&&running)badge='<div class="freq-badge badge-over">OVR</div>';
    if(d===underBot.digit&&running)badge='<div class="freq-badge badge-under">UND</div>';
    g.innerHTML+=`<div class="freq-col"><div class="freq-bar-wrap"><div class="${bc}" style="height:${pct}%"></div></div>${badge}<div class="freq-num">${f[d]}</div><div class="freq-d">${d}</div></div>`;
  }
  document.getElementById('tickCount').textContent=t+' ticks';
}
function addLog(msg,type){
  const b=document.getElementById('logBody');
  const ts=new Date().toLocaleTimeString('en-GB',{hour12:false});
  const el=document.createElement('div');
  el.className='log-entry '+(type||'info');
  el.textContent='['+ts+'] '+msg;
  b.appendChild(el);b.scrollTop=b.scrollHeight;
}
function clearLog(){document.getElementById('logBody').innerHTML='';}
updateFreq();
</script>
</body>
</html>
